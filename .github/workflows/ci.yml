name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint + Format — ESLint + Prettier (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint:eslint

      - name: Prettier check
        run: pnpm format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Type Check — tsc --noEmit (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Tests + Coverage — vitest (80% gate, blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (vitest)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: pnpm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: Build — tsup (verifies library compiles and exports correctly)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (tsup)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: SAST — Semgrep (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/typescript \
            --config p/react \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            src/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6: Dependency CVEs — pnpm audit (blocks merge on high/critical)
  # ─────────────────────────────────────────────────────────────────────────────
  pnpm-audit:
    name: Dependency CVEs (pnpm audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7: Secret Scan — TruffleHog (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────────────────
  # Notify on failure — Slack
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, semgrep, pnpm-audit, secret-scan]
    if: failure()
    steps:
      - name: Slack failure notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ CI Failed — ugsys-ui-lib",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ CI Failed — ugsys-ui-lib", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`"},
                    {"type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
