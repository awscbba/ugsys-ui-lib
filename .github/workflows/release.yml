name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0) — leave empty to use package.json version"
        required: false

permissions:
  contents: write  # needed to create tags and GitHub releases

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Quality gate (same as CI — must pass before release)
  # ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:eslint

      - name: Prettier check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Tests + coverage
        run: pnpm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Build + publish GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG already exists — skipping release."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: Create dist tarball
        if: env.skip != 'true'
        run: |
          tar -czf ugsys-ui-lib-${{ steps.version.outputs.version }}.tar.gz dist/ src/ tailwind.preset.ts
          echo "Tarball contents:"
          tar -tzf ugsys-ui-lib-${{ steps.version.outputs.version }}.tar.gz

      - name: Create git tag
        if: env.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: env.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "@ugsys/ui-lib ${{ steps.version.outputs.tag }}"
          body: |
            ## @ugsys/ui-lib ${{ steps.version.outputs.tag }}

            ### Install (consumer repos)
            ```toml
            # pyproject.toml / package.json — use git source pinned to this tag
            "@ugsys/ui-lib": "github:awscbba/ugsys-ui-lib#${{ steps.version.outputs.tag }}"
            ```

            ### What's included
            - `dist/index.mjs` — ESM build
            - `dist/index.cjs` — CJS build
            - `dist/index.d.ts` — TypeScript declarations
            - `dist/tokens.css` — CSS custom properties
            - `src/` — raw TypeScript source (for Tailwind v4 `@source` scanning)
            - `tailwind.preset.ts` — Tailwind v4 preset

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: ugsys-ui-lib-${{ steps.version.outputs.version }}.tar.gz
          draft: false
          prerelease: false

      - name: Notify success
        if: env.skip != 'true' && success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":rocket:",
              "text": "🚀 Released — @ugsys/ui-lib ${{ steps.version.outputs.tag }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "🚀 Released — @ugsys/ui-lib ${{ steps.version.outputs.tag }}", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n`${{ steps.version.outputs.tag }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Release"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"}
                  ]
                }
              ]
            }

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Release Failed — ugsys-ui-lib",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Release Failed — ugsys-ui-lib", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
